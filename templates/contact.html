{% extends 'base.html' %}

{% block title %}Contact{% endblock title %}

{% block body %}

<!-- CONTACT FORM -->
<div class="container mb-5">
  <div class="card shadow-lg p-4 contact-card">
    <h2 class="text-center mb-4">💬 Ask Your Questions</h2>

    <form method="POST" action="/contact">
      {% csrf_token %}

      <div class="form-group mb-3">
        <label>Your Name</label>
        <input type="text" class="form-control" name="name" placeholder="Enter your name">
      </div>

      <div class="form-group mb-3">
        <label>Email Address</label>
        <input type="email" class="form-control" name="email" placeholder="name@example.com">
      </div>

      <div class="form-group mb-3">
        <label>Phone Number</label>
        <input type="text" class="form-control" name="phone" placeholder="Enter your phone number">
      </div>

      <div class="form-group mb-3">
        <label>Your Message</label>
        <textarea class="form-control" rows="4" name="description"></textarea>
      </div>

      <button class="btn btn-primary w-100">🚀 Submit</button>
    </form>
  </div>
</div>

<!-- SOCIAL CONTACT -->
<div class="container text-center mb-5">
  <h2 class="mb-4">🌐 Connect With Me</h2>

  <div class="row">

    <!-- FLIPKART -->
    <div class="col-md-4 mb-4">
      <div class="card social-card shadow">
        <div class="card-body">
          <a href="https://www.facebook.com/yourprofile" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/145/145802.png" 
         alt="Facebook" 
         width="50" 
         height="60"
         style="margin: 0 10px;">
  </a>
          <h5 class="mt-3">Facebook</h5>
          <p>Follow me</p> 
          <a href="https://www.linkedin.com/in/tamilkavibharathi-s-745878320/" class="btn btn-warning w-100">Visit</a>
        </div>
      </div>
    </div>

    <!-- INSTAGRAM -->
    <div class="col-md-4 mb-4">
      <div class="card social-card shadow">
        <div class="card-body">
          <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" width="60">
          <h5 class="mt-3">Instagram</h5>
          <p>Follow me</p>
          <a href="https://www.linkedin.com/in/tamilkavibharathi-s-745878320/" class="btn btn-danger w-100">Open</a>
        </div>
      </div>
    </div>

    <!-- LINKEDIN -->
    <div class="col-md-4 mb-4">
      <div class="card social-card shadow">
        <div class="card-body">
          <img src="https://cdn-icons-png.flaticon.com/512/145/145807.png" width="60">
          <h5 class="mt-3">LinkedIn</h5>
          <p>Connect professionally</p>
          <a href="https://www.linkedin.com/in/tamilkavibharathi-s-745878320/" class="btn btn-primary w-100">Connect</a>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- STYLES -->
<style>
  
body {
  background: linear-gradient(to right, #4facfe, #00f2fe);
  font-family: 'Segoe UI', sans-serif;
}

/* FORM CARD */
.contact-card {
  border-radius: 15px;
  background: white;
}

/* SOCIAL CARDS */
.social-card {
  border-radius: 15px;
  transition: 0.3s;
}

.social-card:hover {
  transform: translateY(-10px);
  box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
}

/* BUTTON */
.btn {
  border-radius: 25px;
  font-weight: bold;
}
</style>

{% endblock body %}
